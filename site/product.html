<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MallowMauve | Product</title>
    <meta
      name="description"
      content="View a MallowMauve textile piece through a concierge-style journey backed by the structured collection content."
    />
    <link rel="stylesheet" href="./styles.css?v=20260408-backlink1" />
  </head>
  <body class="product-page">
    <div class="atmosphere" aria-hidden="true"></div>
    <div class="drawer-backdrop" data-close-drawer hidden></div>
    <header class="site-header">
      <div class="header-top">
        <a class="brand-logo" href="./index.html" aria-label="MallowMauve home">
          <img
            class="brand-logo-image"
            src="./public/brand/mallowmauve-logo.png"
            alt=""
            width="721"
            height="548"
          />
        </a>
        <a class="wordmark" href="./index.html" aria-label="MallowMauve home">
          <img
            class="wordmark-image"
            src="./public/brand/mallowmauve-wordmark.png"
            alt=""
            width="1768"
            height="233"
          />
        </a>
        <div class="header-actions">
          <button
            class="wishlist-nav"
            type="button"
            data-open-drawer="wishlist"
            aria-expanded="false"
            aria-controls="inquiry-drawer"
          >
            <span>Wishlist</span>
            <span class="wishlist-count" data-wishlist-count-nav></span>
          </button>
          <button
            class="selections-nav"
            type="button"
            data-open-drawer="selections"
            aria-expanded="false"
            aria-controls="inquiry-drawer"
          >
            <span>Selections</span>
            <span class="selections-count" data-inquiry-count></span>
          </button>
        </div>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="./index.html#collections">Collections</a>
        <a href="./index.html#our-story">Our Story</a>
        <a href="./index.html#contact">Contact</a>
      </nav>
    </header>

    <aside class="inquiry-drawer" id="inquiry-drawer" aria-hidden="true" aria-labelledby="inquiry-title">
      <div class="drawer-handle" aria-hidden="true"></div>
      <div class="drawer-header">
        <div>
          <p class="eyebrow">Selections</p>
          <h2 id="inquiry-title">A quiet shortlist</h2>
        </div>
        <button class="drawer-close" type="button" data-close-drawer aria-label="Close selections panel">
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="drawer-section" data-drawer-section="selections">
        <p class="drawer-intro" data-selection-summary>
          No pieces selected yet.
        </p>
        <div class="drawer-list" data-inquiry-list></div>
        <p class="drawer-empty" data-inquiry-empty>
          Selected pieces will gather here.
        </p>
      </div>

      <div class="drawer-section drawer-section-soft" data-drawer-section="wishlist">
        <div class="drawer-subhead">
          <p class="eyebrow">Wishlist</p>
          <span class="drawer-subcount" data-wishlist-count>0 saved</span>
        </div>
        <div class="drawer-list drawer-list-compact" data-wishlist-list></div>
        <p class="drawer-empty" data-wishlist-empty>
          Saved pieces rest here for later.
        </p>
      </div>

      <div class="drawer-footer">
        <a
          class="button button-filled button-full"
          href="#"
          target="_blank"
          rel="noreferrer"
          data-send-request
        >
          Send Request via WhatsApp
        </a>
      </div>
    </aside>

    <main class="detail-main" data-product-detail-page></main>

    <footer class="site-footer">
      <span class="footer-mark">
        <img
          class="footer-wordmark-image"
          src="./public/brand/mallowmauve-wordmark.png"
          alt="MallowMauve"
          width="1768"
          height="233"
        />
      </span>
      <div class="footer-links">
        <a href="./index.html#our-story">Our Story</a>
        <a href="./index.html#collections">Collections</a>
        <a href="./index.html#contact">Contact</a>
      </div>
    </footer>

    <script defer src="/collection-data.js"></script>
    <script defer src="/experience.js"></script>
    <script defer src="./script.js"></script>
  </body>
</html>
